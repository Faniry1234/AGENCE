version: '3.8'

services:
  web:
    build: .
    container_name: mada-voyage-web
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - DB_SSL_MODE=${DB_SSL_MODE}
      - APP_ENV=${APP_ENV}
      - APP_DEBUG=${APP_DEBUG}
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - mada-network
    env_file:
      - .env

  # Local MySQL database for development
  # For production with Aiven, comment out this service
  db:
    image: mysql:8.0
    container_name: mada-voyage-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS:-root}
      - MYSQL_DATABASE=${DB_NAME:-madavoyage}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./donnees.sql:/docker-entrypoint-initdb.d/donnees.sql
    networks:
      - mada-network
    profiles:
      - dev

volumes:
  db-data:

networks:
  mada-network:
    driver: bridge
